# Push to main or tag: detect changed modules, build only those Docker images.

name: Docker Build & Push to GHCR

on:
  push:
    branches:
      - 'main'
    tags:
      - '*'

env:
  DOCKER_APP_NAME: ${{ github.repository }}

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            stock-api:
              - 'application/stock-api/**'
              - 'domain/**'
              - 'infrastructure/**'
              - 'library/**'
              - 'build.gradle'
              - 'settings.gradle'
            stock-batch:
              - 'application/stock-batch/**'
              - 'domain/**'
              - 'infrastructure/**'
              - 'library/**'
              - 'build.gradle'
              - 'settings.gradle'
            stock-consumer:
              - 'application/stock-consumer/**'
              - 'domain/**'
              - 'infrastructure/**'
              - 'library/**'
              - 'build.gradle'
              - 'settings.gradle'
            web:
              - 'web/**'

  build_and_push:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.apps != '[]' && needs.detect_changes.outputs.apps != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect_changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set app directory
        id: app_dir
        run: |
          if [[ "${{ matrix.app }}" == "web" ]]; then
            echo "dir=web" >> "$GITHUB_OUTPUT"
          else
            echo "dir=application/${{ matrix.app }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: matrix.app != 'web'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        if: matrix.app != 'web'
        run: chmod +x ./gradlew

      - name: Build with Gradle
        if: matrix.app != 'web'
        run: ./gradlew :${{ matrix.app }}:build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "IMAGE_TAG=latest" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.app_dir.outputs.dir }}
          file: ${{ steps.app_dir.outputs.dir }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.DOCKER_APP_NAME }}/${{ matrix.app }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.DOCKER_APP_NAME }}/${{ matrix.app }}:${{ github.sha }}
