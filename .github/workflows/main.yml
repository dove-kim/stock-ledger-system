name: Docker Build & Push to GHCR

on:
  push:
    branches:
      - 'main'
    tags:
      - '*'

env:
  DOCKER_APP_NAME: ${{ github.repository }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: stock-api
            dir: application/stock-api
            image: stock-ledger-api
            java: true
          - app: stock-batch
            dir: application/stock-batch
            image: stock-ledger-batch
            java: true
          - app: stock-consumer
            dir: application/stock-consumer
            image: stock-ledger-consumer
            java: true
          - app: web
            dir: web
            image: stock-ledger-web
            java: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'

      - name: Build with Gradle
        if: matrix.java
        run: |
          chmod +x ./gradlew
          ./gradlew :${{ matrix.app }}:build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "IMAGE_TAG=latest" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.dir }}
          file: ${{ matrix.dir }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.DOCKER_APP_NAME }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.DOCKER_APP_NAME }}/${{ matrix.image }}:${{ github.sha }}
